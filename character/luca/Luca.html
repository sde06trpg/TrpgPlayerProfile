<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>루카 페이지</title>
    <link rel="stylesheet" href="../character-page-style.css">
</head>

<body>

    <div class="navbar">
        <div class="char-name">[루카]</div>
    </div>

    <div class="container">

        <div class="section">
            <h2>캐릭터 정보</h2>
            <div class="info-grid">
                <div class="label">이름</div><div>[루카]</div>
                <div class="label">성별</div><div>[여성]</div>
                <div class="label">나이</div><div>[16]</div>
                <div class="label">키 / 몸무게</div><div>[150/50]</div>
                <div class="label">성격</div><div>[순수하고 정직하며 호기심이 많다. 이해력이 느리고 세상물정에 서툴지만 배우려는 마음은 강하다.]</div>
                <div class="label">종족</div><div>[인간]</div>
                <div class="label">가치관</div><div>[질서]</div>
                <div class="label">직업</div><div>[사제]</div>
            </div>
        </div>

        <div class="section">
            <h2>외형</h2>
            <div class="image-grid">
                <div class="image-box">
                    <img src="../../images/Luca/루카_기본.png">
                    <p>기본</p>
                </div>
                <div class="image-box">
                    <img src="../../images/Luca/루카_화남.png">
                    <p>분노</p>
                </div>
                <div class="image-box">
                    <img src="../../images/Luca/루카_슬픔.png">
                    <p>슬픔</p>
                </div>
                <div class="image-box">
                    <img src="../../images/Luca/루카_기쁨.png">
                    <p>기쁨</p>
                </div>
            </div>
        </div>

        <div class="section">
            <h2>과거사 & 목적</h2>
            <div class="accordion">▶ 과거사</div>
            <div class="panel">[루카의 과거사 내용 생략]</div>

            <div class="accordion">▶ 목적</div>
            <div class="panel">[루카의 목적 내용 생략]</div>
        </div>

        <div class="section">
            <h2>캐릭터 시트</h2>
            <a href="https://docs.google.com/spreadsheets/d/1DpERJ6yvG9AwJAp2CmtM_KcRJPLHU7wsxR6387ssJlk/edit?gid=574150008#gid=574150008" class="link-btn" target="_blank" rel="noopener noreferrer">캐릭터 시트로 이동</a>    
        </div>

    </div>

    <script src="../character-page-system.js"></script>

</body>
</html>
